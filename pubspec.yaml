name: teksat
description: TekSat - Azərbaycanda ilk açıq artırma platforması
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP sorğuları üçün
  http: ^1.2.0

  # Lokal sessiya saxlamaq üçün
  shared_preferences: ^2.2.2

  # Şəkil seçmək üçün (qalereya)
  image_picker: ^1.0.7

  # İkonlar
  cupertino_icons: ^1.0.6

  # QEYD: WebSocket üçün ƏLAVƏ PAKET LAZIM DEYİL —
  # dart:io-nun öz WebSocket sinifi istifadə olunur (services/socket_service.dart)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Poppins şriftini əlavə etmək üçün google_fonts paketi istifadə edə bilərsən
  # və ya fonts/ qovluğuna yerli şrift fayli qoy:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: fonts/Poppins-Regular.ttf
  #       - asset: fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: fonts/Poppins-Bold.ttf
  #         weight: 700
  #       - asset: fonts/Poppins-ExtraBold.ttf
  #         weight: 800
